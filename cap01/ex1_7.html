<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 07</title>
</head>
<body>
    <script>
        const jantar = Number(prompt("Valor de um jantar?"));
        const gorjet = jantar * 0.1;
        const total = jantar + gorjet;
        alert(`O valor do jantar é: R$ ${jantar.toFixed(2)}\nGorjeta (10%): R$ ${gorjet.toFixed(2)}\nValor total: R$ ${total.toFixed(2)}`);
    </script>
</body>
</html>
