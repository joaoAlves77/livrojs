<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 08</title>
</head>
<body>
    <script>
        const dias = Number(prompt("Quantos dias de viagem?"));
        const horas = Number(prompt("Quantas horas?"));
        const total = (dias * 24) + horas;
        alert(`numero de dias: ${dias}\nnumero de horas: ${horas}\ntotal de horas: ${total}`);
    </script>
</body>
</html>
